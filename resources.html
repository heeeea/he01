    <header class="site-header">
      <nav class="navbar" aria-label="主导航">
        <a class="brand" href="index.html">贺 · 01</a>
        <button class="menu-toggle" type="button" aria-label="打开导航菜单" aria-expanded="false" aria-controls="primary-menu"><span></span><span></span><span></span></button>

          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="page-hero reveal">
        <p class="eyebrow">Resource Center</p>
        <h1>资源下载中心</h1>
        <p>这里整理的是教程配套资料、提示词模板、检查清单、工具配置文件和项目案例包。适合边看教程边下载使用，部分资源整理中，可通过联系合作获取。</p>
      </section>

      <!-- 搜索栏 -->
      <div class="resource-search-wrap reveal" aria-label="资源搜索">
        <span class="resource-search-icon" aria-hidden="true"></span>
        <input id="resourceSearchInput" type="search" placeholder="搜索资源、提示词、模板、工具清单..." autocomplete="off" data-resource-search>
      </div>

      <!-- 分类筛选 -->
      <section class="filter-bar reveal" aria-label="资源分类筛选" data-resource-category-bar>
        <button class="filter-button active" type="button" data-filter="all">全部</button>
        <button class="filter-button" type="button" data-filter="提示词">提示词</button>
        <button class="filter-button" type="button" data-filter="模板">模板</button>
        <button class="filter-button" type="button" data-filter="教程资料">教程资料</button>
        <button class="filter-button" type="button" data-filter="工具清单">工具清单</button>
        <button class="filter-button" type="button" data-filter="项目案例">项目案例</button>
        <button class="filter-button" type="button" data-filter="安装排查">安装排查</button>
      </section>

      <!-- 场景筛选 -->
      <section class="scene-bar reveal" aria-label="按场景筛选资源" data-resource-scene-bar>
        <button class="scene-button active" type="button" data-scene="all">全部场景</button>
        <button class="scene-button" type="button" data-scene="website">做网站用</button>
        <button class="scene-button" type="button" data-scene="comfyui">学 ComfyUI 用</button>
        <button class="scene-button" type="button" data-scene="install">AI 工具安装用</button>
        <button class="scene-button" type="button" data-scene="delivery">项目交付用</button>
        <button class="scene-button" type="button" data-scene="prompt">提示词模板</button>
        <button class="scene-button" type="button" data-scene="checklist">排错检查表</button>
      </section>

      <!-- 资源列表 -->
      <section class="content-grid resources-grid reveal" aria-label="资源列表" data-render="resources"></section>
    </main>

    <footer class="site-footer"><p>© 2026 贺 · 01 AI 实战资源库</p><nav><a href="index.html">首页</a><a href="tutorials.html">实战教程</a><a href="contact.html">联系合作</a><a href="admin.html">管理后台</a></nav></footer>
